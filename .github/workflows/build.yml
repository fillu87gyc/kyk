name: CI — Test → Build → Release

# バージョンアップ（main への push / タグ）は必ず自動テストを通過した場合のみ
# ビルド・リリースされる。PR でもテストが走り、緑でなければマージ前に気づける。
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  GUT_VERSION: "9.3.0"

jobs:
  # ---------------------------------------------------------------------------
  # 1) 自動テスト（GUT headless）— これが緑でなければ以降は一切走らない
  # ---------------------------------------------------------------------------
  test:
    name: Automated Tests (GUT headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4 (headless)
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install GUT (test framework)
        run: |
          # GUT はリポジトリに同梱しない（.gitignore 済み）。CI で固定版を取得する。
          wget -q "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.zip" -O /tmp/gut.zip
          unzip -q /tmp/gut.zip -d /tmp/gut
          mkdir -p addons/gut
          cp -r "/tmp/gut/Gut-${GUT_VERSION}/addons/gut/." addons/gut/
          test -f addons/gut/gut_cmdln.gd

      - name: Import project (class_name キャッシュ生成)
        run: |
          # 初回 import で global class（PlayerLogic 等）の解決キャッシュを作る。
          godot --headless --import 2>&1 | tail -n 40 || true

      - name: Run GUT tests
        run: |
          set -o pipefail
          godot --headless \
            -s res://addons/gut/gut_cmdln.gd \
            -gconfig=res://tests/gut_config.json \
            2>&1 | tee gut_output.log
          # gut_config.json の should_exit_on_success=true により、
          # 失敗があれば godot は非ゼロ終了し、このジョブが赤になる。

  # ---------------------------------------------------------------------------
  # 2) Linux バイナリのエクスポート＆配布（テスト通過後・PR では走らない）
  # ---------------------------------------------------------------------------
  export-linux:
    name: Export Linux (Steam Deck)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/linux_debug.x86_64   "$TEMPLATES_DIR/"
          cp /tmp/templates/templates/linux_release.x86_64 "$TEMPLATES_DIR/"

      - name: Export Linux binary
        run: |
          mkdir -p build
          godot --headless --export-release "Linux (Steam Deck)" build/kouya-kou.x86_64
          chmod +x build/kouya-kou.x86_64

      - name: Create archive
        run: |
          cp README.md build/
          cd build && tar czf kouya-kou-linux-x86_64.tar.gz kouya-kou.x86_64 README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kouya-kou-linux
          path: build/kouya-kou-linux-x86_64.tar.gz

      - name: Update latest release (main branch)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build (main)"
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "build/kouya-kou-linux-x86_64.tar.gz"
          body: |
            mainブランチの最新ビルドです。pushのたびに自動テスト通過後に自動更新されます。

            **コミット:** ${{ github.sha }}
            **更新日時:** ${{ github.event.head_commit.timestamp }}

            ## Steam Deck でのインストール方法

            ```bash
            mkdir -p ~/games/kouya-kou && cd ~/games/kouya-kou
            curl -L https://github.com/${{ github.repository }}/releases/download/latest/kouya-kou-linux-x86_64.tar.gz | tar xz
            ./kouya-kou.x86_64
            ```

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: build/kouya-kou-linux-x86_64.tar.gz
          body: |
            ## Steam Deck でのインストール方法

            ```bash
            mkdir -p ~/games/kouya-kou && cd ~/games/kouya-kou
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/kouya-kou-linux-x86_64.tar.gz | tar xz
            ./kouya-kou.x86_64
            ```
